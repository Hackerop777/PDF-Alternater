<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart PDF Alternater - Journal Maker</title>
    <!-- Import pdf-lib from CDN -->
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .container {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 500px;
            text-align: center;
        }
        h1 { color: #2c3e50; margin-bottom: 0.5rem; }
        p { color: #7f8c8d; margin-bottom: 1.5rem; font-size: 0.9rem; line-height: 1.5; }
        .upload-box {
            border: 2px dashed #bdc3c7;
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            text-align: left;
            transition: border-color 0.3s;
        }
        .upload-box:hover { border-color: #3498db; }
        label { font-weight: bold; display: block; margin-bottom: 0.5rem; color: #34495e; }
        input[type="file"] { width: 100%; }
        button {
            background-color: #2980b9;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 1rem;
            border-radius: 6px;
            cursor: pointer;
            width: 100%;
            margin-top: 1rem;
            transition: background 0.3s;
        }
        button:hover { background-color: #3498db; }
        button:disabled { background-color: #95a5a6; cursor: not-allowed; }
        #status { margin-top: 1rem; font-weight: bold; color: #27ae60; min-height: 20px; font-size: 0.9rem;}
    </style>
</head>
<body>

<div class="container">
    <h1>Smart PDF Alternater</h1>
    <p>Upload any two PDFs. The tool will <strong>automatically detect</strong> the shorter one as your template and interleave it with the longer one!</p>
    
    <div class="upload-box">
        <label for="pdfA">Upload First PDF</label>
        <input type="file" id="pdfA" accept="application/pdf">
    </div>

    <div class="upload-box">
        <label for="pdfB">Upload Second PDF</label>
        <input type="file" id="pdfB" accept="application/pdf">
    </div>

    <button id="processBtn" onclick="generateJournal()">Generate Smart Journal</button>
    <div id="status"></div>
</div>

<script>
    const { PDFDocument } = PDFLib;

    async function generateJournal() {
        const fileA = document.getElementById('pdfA').files[0];
        const fileB = document.getElementById('pdfB').files[0];
        const statusEl = document.getElementById('status');
        const btn = document.getElementById('processBtn');

        // Validation
        if (!fileA || !fileB) {
            statusEl.style.color = '#e74c3c';
            statusEl.innerText = 'Please upload both PDF files!';
            return;
        }

        btn.disabled = true;
        statusEl.style.color = '#2980b9';
        statusEl.innerText = 'Analyzing page counts...';

        try {
            // 1. Read files as ArrayBuffers
            const bytesA = await fileA.arrayBuffer();
            const bytesB = await fileB.arrayBuffer();

            // 2. Load PDFs to check page counts
            const pdfA = await PDFDocument.load(bytesA);
            const pdfB = await PDFDocument.load(bytesB);
            
            const countA = pdfA.getPageCount();
            const countB = pdfB.getPageCount();

            // 3. SMART DETECTION: Figure out which is the template and which is the content
            let templatePdf, contentPdf, templateName, contentName;
            
            if (countA <= countB) {
                templatePdf = pdfA;
                contentPdf = pdfB;
                templateName = fileA.name;
                contentName = fileB.name;
            } else {
                templatePdf = pdfB;
                contentPdf = pdfA;
                templateName = fileB.name;
                contentName = fileA.name;
            }

            statusEl.innerText = `Detected Template: ${templateName} (${templatePdf.getPageCount()} pages)\nDetected Content: ${contentName} (${contentPdf.getPageCount()} pages)\nMerging...`;

            // 4. Create a new empty PDF
            const mergedPdf = await PDFDocument.create();

            const templatePageCount = templatePdf.getPageCount();
            const contentPageCount = contentPdf.getPageCount();

            // 5. Copy all pages from both PDFs
            const templatePageIndices = Array.from({ length: templatePageCount }, (_, i) => i);
            const templatePages = await mergedPdf.copyPages(templatePdf, templatePageIndices);

            const contentPageIndices = Array.from({ length: contentPageCount }, (_, i) => i);
            const contentPages = await mergedPdf.copyPages(contentPdf, contentPageIndices);

            // 6. Interleave: Add ALL template pages, then ONE content page, repeat...
            for (let i = 0; i < contentPageCount; i++) {
                // Insert the entire template (whether it's 1 page, 2 pages, etc.)
                for (let t = 0; t < templatePageCount; t++) {
                    mergedPdf.addPage(templatePages[t]);
                }
                // Insert the current content page
                mergedPdf.addPage(contentPages[i]);
            }

            // 7. Save and Download
            const pdfBytes = await mergedPdf.save();
            const blob = new Blob([pdfBytes], { type: 'application/pdf' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = 'Smart_Alternated_Journal.pdf';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);

            statusEl.style.color = '#27ae60';
            statusEl.innerText = 'Success! Your Smart Journal is downloading.';
        } catch (error) {
            console.error(error);
            statusEl.style.color = '#e74c3c';
            statusEl.innerText = 'Error processing PDFs. Check console for details.';
        } finally {
            btn.disabled = false;
        }
    }
</script>

</body>
</html>
